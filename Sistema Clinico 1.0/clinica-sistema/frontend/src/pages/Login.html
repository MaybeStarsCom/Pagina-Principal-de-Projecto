<!DOCTYPE html>
<html lang="es">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Medical Login</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#0f172a;
    }

    .container{
      width:100%;
      height:100vh;
      display:flex;
    }

    /* ========================= */
    /* LEFT PANEL */
    /* ========================= */

    .left-panel{
      width:35%;
      min-width:360px;

      background:
      rgba(255,255,255,0.93);

      backdrop-filter:blur(10px);

      display:flex;
      justify-content:center;
      align-items:center;

      padding:40px;

      z-index:2;
    }

    .login-card{
      width:100%;
      max-width:340px;
    }

    .logo-area{
      text-align:center;
      margin-bottom:45px;
    }

    .logo-circle{
      width:95px;
      height:95px;

      border-radius:50%;

      background:#1d4ed8;

      margin:auto;
      margin-bottom:20px;

      overflow:hidden;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    .logo-circle img{
      width:70%;
      object-fit:contain;
    }

    .logo-area h2{
      color:#1e293b;
      margin-bottom:10px;
      font-size:30px;
    }

    .logo-area p{
      color:#64748b;
      font-size:15px;
    }

    /* ========================= */
    /* FORM */
    /* ========================= */

    .login-form{
      display:flex;
      flex-direction:column;
      gap:22px;
    }

    .input-group{
      position:relative;
    }

    .input-group input{
      width:100%;

      padding:16px 20px;

      border-radius:16px;

      border:1px solid #dbe4f0;

      outline:none;

      font-size:15px;

      transition:0.3s;

      background:white;
    }

    .input-group input:focus{

      border-color:#2563eb;

      box-shadow:
      0 0 0 4px rgba(37,99,235,0.10);

    }

    .options{
      display:flex;
      align-items:center;

      font-size:14px;
      color:#64748b;
    }

    .login-btn{
      width:100%;

      padding:16px;

      border:none;

      border-radius:16px;

      background:
      linear-gradient(
        135deg,
        #2563eb,
        #1d4ed8
      );

      color:white;

      font-size:16px;
      font-weight:bold;

      cursor:pointer;

      transition:0.3s;
    }

    .login-btn:hover{

      transform:translateY(-2px);

      box-shadow:
      0 10px 25px rgba(37,99,235,0.30);

    }

    .footer{
      margin-top:40px;

      text-align:center;

      color:#94a3b8;

      font-size:13px;
    }

    /* ========================= */
    /* RIGHT PANEL */
    /* ========================= */

    .right-panel{
      flex:1;

      position:relative;

      overflow:hidden;

      background-image:
      url("./Images/FondoLogin.avif");

      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;

      display:flex;
      justify-content:center;
      align-items:center;
    }

    /* CAPA OSCURA + BLUR */

    .right-panel::before{
      content:"";

      position:absolute;
      inset:0;

      backdrop-filter:blur(8px);

      background:
      rgba(15,23,42,0.50);

      z-index:1;
    }

    /* TEXTO */

    .welcome{
      position:relative;

      z-index:2;

      max-width:600px;

      color:white;

      text-align:center;

      padding:40px;
    }

    .welcome h1{
      font-size:90px;
      margin-bottom:20px;
      font-weight:800;
    }

    .welcome p{
      font-size:22px;
      line-height:1.8;

      color:
      rgba(255,255,255,0.88);
    }

    /* ========================= */
    /* RESPONSIVE */
    /* ========================= */

    @media(max-width:1000px){

      .container{
        flex-direction:column;
      }

      .left-panel{
        width:100%;
        min-height:55vh;
      }

      .right-panel{
        min-height:45vh;
      }

      .welcome h1{
        font-size:60px;
      }

      .welcome p{
        font-size:18px;
      }

    }

  </style>

</head>

<body>

  <div class="container">

    <!-- LEFT PANEL -->

    <div class="left-panel">

      <div class="login-card">

        <!-- LOGO -->

        <div class="logo-area">

          <div class="logo-circle">

            <img
              src="./Images/ImagenLogin.jpeg"
              alt="Logo"
            >

          </div>

          <h2>Medical System</h2>

          <p>
            Gestión médica profesional
          </p>

        </div>

        <!-- FORM -->

        <form
          class="login-form"
          id="loginForm"
        >

          <div class="input-group">

            <input
              type="email"
              id="email"
              placeholder="Correo electrónico"
              required
            >

          </div>

          <div class="input-group">

            <input
              type="password"
              id="password"
              placeholder="Contraseña"
              required
            >

          </div>

          <div class="options">

            <label>
              <input type="checkbox">
              Remember me
            </label>

          </div>

          <button
            type="submit"
            class="login-btn"
          >
            Iniciar Sesión
          </button>

        </form>

        <div class="footer">
          © 2026 Medical System
        </div>

      </div>

    </div>

    <!-- RIGHT PANEL -->

    <div class="right-panel">

      <div class="welcome">

        <h1>Bienvenido.</h1>

        <p>
          Administra pacientes, citas y reportes
          desde un sistema moderno, rápido y seguro.
        </p>

      </div>

    </div>

  </div>

  <script>

    const loginForm =
      document.getElementById("loginForm");

    loginForm.addEventListener(
      "submit",
      function(e){

        e.preventDefault();

        const email =
          document.getElementById("email").value;

        const password =
          document.getElementById("password").value;

        console.log({
          email,
          password
        });

        alert("Login funcionando");

      }
    );

  </script>

</body>
</html>
